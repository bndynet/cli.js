name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    uses: bndynet/gh.flows/.github/workflows/npm-publish.yml@main
    with:
      node-version: '24'
      working-directory: '.'
      publish: true
      auth-method: 'oidc'
      provenance: true
      publish-tag: latest
      build-command: npm run build

